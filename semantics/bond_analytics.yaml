# Semantic profile for the Bond Analytics DB (bond_analytics.db).


dataset: bond_analytics
backend: sqlite
description: >
  Bond analytics database that will hold the bond (identified by ISIN or a BondID or a combination of issuer, coupon and maturity) and its analytics (e.g. yield, duration, convexity, etc.) for a particular settlement date 

vocabulary:
  # possible values stored in the issuer column, these match the ISSUERS dictionary in the issuers.py file
  issuers:
    United States: USA
    Germany: DEU
    United Kingdom: GBR
    UK: GBR
    Japan: JPN
    Australia: AUS
    Austria: AUT
    Belgium: BEL
    Brazil: BRA
    Canada: CAN
    Switzerland: CHE
    China: CHN
    Spain: ESP
    France: FRA
    Greece: GRC
    India: IND
    Ireland: IRL
    Italy: ITA
    Korea: KOR
    Netherlands: NLD
    Portugal: PRT
    Russia: RUS
    Bulgaria: BGR
    Colombia: COL
    Croatia: CRO
    Cyprus: CYP
    Czech Republic: CZE
    Denmark: DNK
    Estonia: EST
    Finland: FIN
    Mexico: MEX
    South Africa: ZAF
    Saudi Arabia: SAU
    Singapore: SGP
    Sweden: SWE
    New Zealand: NZL
    Norway: NOR
  currencies:
    USA: USD
    DEU: EUR
    GBR: GBP
    JPN: JPY
    AUS: AUD
    AUT: EUR
    BEL: EUR
    BRA: BRL
    CAN: CAD
    CHE: CHF
    CHN: CNY
    ESP: EUR
    FRA: EUR
    GRC: EUR
    IND: INR
    IRL: EUR
    ITA: EUR
    KOR: KRW
    NLD: EUR
    PRT: EUR
    RUS: RUB
    BGR: EUR
    COL: COP
    CRO: EUR
    CYP: EUR
    CZE: CZK
    DNK: DKK
    EST: EUR
    FIN: EUR
    MEX: MXN
    ZAF: ZAR
    SAU: SAR
    SGP: SGD
    SWE: EUR
