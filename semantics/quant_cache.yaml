# Semantic profile for the QuantLib analytics cache (defined as quant_cache_db in cqfi.yaml).
#
# Caching Analytic Output objects (like FixedIncomeAnalyticsOutput) live into a (in-memory) database; 
# calculation_log tracks each cached QuantLib run. 
# cache_id's are not meant for direct SQL analysis but bond_id and user_friendly_id are.

dataset: quant_cache
backend: sqlite
description: >
  Cached QuantLib for fixed-income analytics. 
  bond_analytics holds fixed-income bond analytic results (like price, yield, duration, convexity, settlement_date, etc.)
  cmt_analytics holds constant-maturity treasury (CMT) analytic results (like price, yield, duration, convexity, settlement_date, etc.)  
  calculation_log indexes each cached function invocation.
  Use this dataset to inspect pricing runs performed in the current session.

vocabulary:
  issuers:
    United States: USA
    US: USA
    Germany: DEU
    DE: DEU
    United Kingdom: GBR
    UK: GBR
    Japan: JPN
    Australia: AUS
    Austria: AUT
    Belgium: BEL
    Brazil: BRA
    Canada: CAN
    Switzerland: CHE
    China: CHN
    Spain: ESP
    France: FRA
    Greece: GRC
    India: IND
    Ireland: IRL
    Italy: ITA
    Korea: KOR
    Netherlands: NLD
    Portugal: PRT
    Russia: RUS
    Bulgaria: BGR
    Colombia: COL
    Croatia: CRO
    Cyprus: CYP
    Czech Republic: CZE
    Denmark: DNK
    Estonia: EST
    Finland: FIN
    Mexico: MEX
    South Africa: ZAF
    Saudi Arabia: SAU
    Singapore: SGP
    Sweden: SWE
    Norway: NOR
    New Zealand: NZL
    Israel: ISR
    Iceland: ISL
    Indonesia: IDN
    Iran: IRN
    Iraq: IRQ

  rate_types:
    zero: zero
    par: par
  tenors:
    "6M": 0.5
    "1Y": 1.0
    "2Y": 2.0
    "3Y": 3.0
    "4Y": 4.0
    "5Y": 5.0
    "7Y": 7.0
    "10Y": 10.0
    "12Y": 12.0
    "15Y": 15.0
    "20Y": 20.0
    "25Y": 25.0
    "30Y": 30.0

conventions:
  date: >
    valuation_date is TEXT 'YYYY-MM-DD'. Filter with date comparisons on that
    column.
  prices: >
    clean_price is per 100 face value. yield_pct and input_rate_pct /
    curve_zero_pct are expressed in percent (e.g. 4.25 means 4.25%).

tables:
  bond_analytics:
    description: 
      analytics (price, yield, duration, convexity, etc.) for a particular bond at a particular settlement date using a particular yield curve 
    columns:
      analytic_id: {type: TEXT, description: "A unique identifier for the analytics (must be unique per record in the bond_analytics table)"}
      bond_id: {type: TEXT, description: "A unique identifier for the bond present in the bond_universe table (matches the bond_id column in the bond_universe table)."}
      created_at: {type: TEXT, description: "UTC timestamp when the analytics were computed."}
      trade_date: {type: TEXT, description: "the trade date (YYYY-MM-DD) of the trade."}
      settlement_date: {type: TEXT, description: "the settlement date (YYYY-MM-DD) of the trade."}
      curve_used: {type: BOOLEAN, description: "1 if the bond curve was used to compute the analytics, 0 otherwise."}
      curve_settings: {type: TEXT, description: "The settings used on the bond curve to compute the analytics."}
      input_column: {type: TEXT, description: "The column (e.g. yield_to_maturity,clean_price,etc.) used as an input to compute the analytics. If present, curve_used must be 0."}
      yield_to_maturity: {type: REAL, description: "Yield to maturity of the bond as a percentage."}
      par_yield: {type: REAL, description: "Par yield of the bond as a percentage."}
      zero_rate: {type: REAL, description: "Zero rate at the maturity date of the bond as a percentage."}
      clean_price: {type: REAL, description: "Clean Price of the bond as a percentage of face value."}
      dirty_price: {type: REAL, description: "Dirty Price of the bond as a percentage of face value."}
      accrued_interest: {type: REAL, description: "Accrued interest of the bond as a percentage of face value (dirty price - clean price)."}
      duration: {type: REAL, description: "Duration of the bond as a percentage (Macaulay duration)."}
      convexity: {type: REAL, description: "Convexity of the bond as a percentage."}
      dv01_sensitivity: {type: REAL, description: "Duration sensitivity of the bond as a percentage of face value (DV01)."}
      gamma_sensitivity: {type: REAL, description: "Dollar convexity sensitivity of the bond as a percentage of face value."}      
      mm_cmt_analytic_id: {type: TEXT, description: "The cmt_analytic_id of the maturity matched CMT for this bond (matches the cmt_analytic_id column in the cmt_analytics table)."}
      mm_fc_cmt_analytic_id: {type: TEXT, description: "The cmt_analytic_id of the maturity matched fixed coupon CMT for this bond (matches the cmt_analytic_id column in the cmt_analytics table)."}
      z_spread: {type: REAL, description: "Z-spread of the bond in basis points (100 basis points = 1%)"}
      repo_rate_1m: {type: REAL, description: "Repo rate of the bond as a percentage using in the carry calculation for 1 month."}
      repo_rate_3m: {type: REAL, description: "Repo rate of the bond as a percentage using in the carry calculation for 3 months."}
      repo_rate_6m: {type: REAL, description: "Repo rate of the bond as a percentage using in the carry calculation for 6 months."}
      repo_rate_1y: {type: REAL, description: "Repo rate of the bond as a percentage using in the carry calculation for 1 year."}
      carry_1m: {type: REAL, description: "Carry of the bond as a percentage of face value for 1 month."}
      carry_3m: {type: REAL, description: "Carry of the bond as a percentage of face value for 3 months."}
      carry_6m: {type: REAL, description: "Carry of the bond as a percentage of face value for 6 months."}
      carry_1y: {type: REAL, description: "Carry of the bond as a percentage of face value for 1 year."}
      roll_1m_spotyield: {type: REAL, description: "Roll of the bond as a percentage of face value for 1 month by comparing the spot yield to maturity of the bond with the yield to maturity of the bond if it matured 1 month earlier."}
      roll_3m_spotyield: {type: REAL, description: "Roll of the bond as a percentage of face value for 3 months by comparing the spot yield to maturity of the bond with the yield to maturity of the bond if it matured 3 months earlier."}
      roll_6m_spotyield: {type: REAL, description: "Roll of the bond as a percentage of face value for 6 months by comparing the spot yield to maturity of the bond with the yield to maturity of the bond if it matured 6 months earlier."}
      roll_1y_spotyield: {type: REAL, description: "Roll of the bond as a percentage of face value for 1 year by comparing the spot yield to maturity of the bond with the yield to maturity of the bond if it matured 1 year earlier."}
      roll_1m_fwdyield: {type: REAL, description: "Roll of the bond as a percentage of face value for 1 month by comparing the spot yield to maturity of the bond with the forward yield to maturity of the bond 1 month in the future"}
      roll_3m_fwdyield: {type: REAL, description: "Roll of the bond as a percentage of face value for 3 months by comparing the spot yield to maturity of the bond with the forward yield to maturity of the bond 3 months in the future"}
      roll_6m_fwdyield: {type: REAL, description: "Roll of the bond as a percentage of face value for 6 months by comparing the spot yield to maturity of the bond with the forward yield to maturity of the bond 6 months in the future"}
      roll_1y_fwdyield: {type: REAL, description: "Roll of the bond as a percentage of face value for 1 year by comparing the spot yield to maturity of the bond with the forward yield to maturity of the bond 1 year in the future"}
      carry_roll_1m_spotyield: {type: REAL, description: "Carry roll of the bond as a percentage of face value for 1 month by comparing the spot yield to maturity of the bond with the yield to maturity of the bond if it matured 1 month earlier."}
      carry_roll_3m_spotyield: {type: REAL, description: "Carry roll of the bond as a percentage of face value for 3 months by comparing the spot yield to maturity of the bond with the yield to maturity of the bond if it matured 3 months earlier."}
      carry_roll_6m_spotyield: {type: REAL, description: "Carry roll of the bond as a percentage of face value for 6 months by comparing the spot yield to maturity of the bond with the yield to maturity of the bond if it matured 6 months earlier."}
      carry_roll_1y_spotyield: {type: REAL, description: "Carry roll of the bond as a percentage of face value for 1 year by comparing the spot yield to maturity of the bond with the yield to maturity of the bond if it matured 1 year earlier."}
      carry_roll_1m_fwdyield: {type: REAL, description: "Carry roll of the bond as a percentage of face value for 1 month by comparing the spot yield to maturity of the bond with the forward yield to maturity of the bond 1 month in the future"}
      carry_roll_3m_fwdyield: {type: REAL, description: "Carry roll of the bond as a percentage of face value for 3 months by comparing the spot yield to maturity of the bond with the forward yield to maturity of the bond 3 months in the future"}
      carry_roll_6m_fwdyield: {type: REAL, description: "Carry roll of the bond as a percentage of face value for 6 months by comparing the spot yield to maturity of the bond with the forward yield to maturity of the bond 6 months in the future"}
      carry_roll_1y_fwdyield: {type: REAL, description: "Carry roll of the bond as a percentage of face value for 1 year by comparing the spot yield to maturity of the bond with the forward yield to maturity of the bond 1 year in the future"}
      asw_spread_1m: {type: REAL, description: "ASW spread of the bond as a percentage of face value for 1 month."}
      asw_spread_3m: {type: REAL, description: "ASW spread of the bond as a percentage of face value for 3 months."}
      asw_spread_6m: {type: REAL, description: "ASW spread of the bond as a percentage of face value for 6 months."}
      asw_spread_1y: {type: REAL, description: "ASW spread of the bond as a percentage of face value for 1 year."}
  cmt_analytics:
    description: >
      analytics (price, yield, duration, convexity, etc.) for a particular CMT tenor or maturity at a particular settlement date using a particular yield curve or supplied input yield or input price      
    columns:
      cmt_analytic_id: {type: TEXT, description: "A unique identifier for the CMT analytics (must be unique per record in the cmt_analytics table)"}
      issuer: {type: TEXT, description: "Country code, e.g. USA, DEU. these match the issuers dictionary in the vocabulary."}
      tenor_label: {type: TEXT, description: "The tenor label (6M, 1Y, ..., 30Y) from the tenor_pillars table columns"}
      created_at: {type: TEXT, description: "UTC timestamp when the analytics were computed."}
      trade_date: {type: TEXT, description: "the trade date (YYYY-MM-DD) of the trade."}
      settlement_date: {type: TEXT, description: "the settlement date (YYYY-MM-DD) of the trade."}
      coupon: {type: REAL, description: "Coupon rate as a percentage."}
      is_fixed_coupon: {type: BOOLEAN, description: "1 if the CMT is a fixed coupon CMT, 0 otherwise."}
      maturity_date: {type: TEXT, description: "the maturity date (YYYY-MM-DD) of the CMT."}
      curve_used: {type: BOOLEAN, description: "1 if the bond curve was used to compute the analytics, 0 otherwise."}
      curve_settings: {type: TEXT, description: "The settings used on the (bond) curve to compute the analytics of the CMT"}
      input_column: {type: TEXT, description: "The column (e.g. yield_to_maturity,clean_price,etc.) used as an input to compute the analytics. If present, curve_used must be 0."}
      yield_to_maturity: {type: REAL, description: "Yield to maturity of the CMT as a percentage."}
      clean_price: {type: REAL, description: "Clean Price of the CMT as a percentage of face value."}
      duration: {type: REAL, description: "Duration of the CMT as a percentage (Macaulay duration)."}
      convexity: {type: REAL, description: "Convexity of the CMT as a percentage."}
      dv01_sensitivity: {type: REAL, description: "Duration sensitivity of the CMT as a percentage of face value (DV01)."}
      gamma_sensitivity: {type: REAL, description: "Dollar convexity sensitivity of the CMT as a percentage of face value."}
      asw_spread_1m: {type: REAL, description: "ASW spread of the CMT as a percentage of face value for 1 month."}
      asw_spread_3m: {type: REAL, description: "ASW spread of the CMT as a percentage of face value for 3 months."}
      asw_spread_6m: {type: REAL, description: "ASW spread of the CMT as a percentage of face value for 6 months."}
      asw_spread_1y: {type: REAL, description: "ASW spread of the CMT as a percentage of face value for 1 year."}

  calculation_log:
    description: >
      One row per cached QuantLib function call (currently price_cmts).
    columns:
      id: {type: INTEGER, description: "Surrogate key."}
      cache_id: {type: TEXT, description: "Framecache key linking to cmt_prices rows."}
      function_name: {type: TEXT, description: "Cached function, e.g. price_cmts."}
      issuer: {type: TEXT, description: "Issuer code when applicable."}
      valuation_date: {type: TEXT, description: "Valuation date when applicable."}
      rate_type: {type: TEXT, description: "zero or par when applicable."}
      row_count: {type: INTEGER, description: "Number of result rows stored."}
      created_at: {type: TEXT, description: "UTC timestamp."}

  cache_entries:
    description: >
      Raw framecache blob store (serialized polars/numpy). Prefer cmt_prices for
      analytics queries unless inspecting cache metadata.
    columns:
      cache_id: {type: TEXT, description: "Full framecache instance id."}
      value: {type: BLOB, description: "Serialized payload (not human-readable)."}
      created_at: {type: TEXT, description: "When the entry was written."}
      expires_at: {type: TEXT, description: "Expiry timestamp or NULL."}

examples:
  - q: "What 10Y CMT clean prices did we compute for US Treasuries?"
    sql: >
      SELECT trade_date, clean_price, yield_to_maturity
      FROM cmt_analytics
      WHERE issuer = 'USA' AND tenor_label = '10y' AND is_fixed_coupon = 0
      ORDER BY trade_date
  - q: "Latest German CMT pricing run"
    sql: >
      SELECT *
      FROM cmt_analytics
      WHERE issuer = 'DEU'
      ORDER BY trade_date DESC
      LIMIT 13
  - q: "How many pricing runs are in this session?"
    sql: >
      SELECT COUNT(*) AS run_count FROM calculation_log
  - q: "What is the yield of French bonds that mature 10Y from now?"
    sql: >
      SELECT AVG(yield_to_maturity)
      FROM bond_analytics
      WHERE issuer = 'FRA' AND CAST((julianday(maturity_date) - julianday(CURRENT_DATE)) / 365.25 AS INTEGER) BETWEEN 9 AND 11
      AND trade_date = (SELECT MAX(trade_date) FROM bond_analytics WHERE issuer = 'FRA');
