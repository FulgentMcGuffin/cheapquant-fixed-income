# CheapQuant Fixed Income — GUI configuration (ChatDialog interface).
# Mirrors cqfi.yaml; both share the same database and semantics paths.
# Launch with:  cqfi-gui [--config path/to/cqfi_gui.yaml]
# Or set CQFI_CONFIG in the environment.

paths:
  # input_db: C:/data/sqlitedb/input_data.db
  # bond_analytics_db: D:/data/sqlitedb/bond_analytics.db
  input_db: D:/data/duckdb/input_data.duckdb
  bond_analytics_db: D:/data/duckdb/bond_analytics.duckdb
  input_semantics: D:/Code/mcp_data/semantics/input_data.yaml
  cache_db: ./data/cache/active_cache.db
  cache_semantics_dir: ./semantics
  sessions_dir: ./data/sessions

settings:
  write_to_bond_analytics_db: true